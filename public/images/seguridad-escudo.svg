<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Escudo digital de seguridad informática</title>
  <desc id="desc">Ilustración en negro y naranja de un escudo, un candado y circuitos digitales.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.55" stop-color="#111114"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9b31"/>
      <stop offset="0.45" stop-color="#ff6a00"/>
      <stop offset="1" stop-color="#d94700"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#ff6a00" stop-opacity="0.33"/>
      <stop offset="0.55" stop-color="#ff6a00" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="25" stdDeviation="24" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#fff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <ellipse cx="800" cy="510" rx="560" ry="420" fill="url(#glow)"/>

