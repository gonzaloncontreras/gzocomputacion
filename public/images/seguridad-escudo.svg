    <path d="M800 202c94 61 197 88 300 102v213c0 162-91 283-300 371-209-88-300-209-300-371V304c103-14 206-41 300-102Z" fill="url(#orange)" opacity="0.95"/>
    <path d="M800 242v593c-179-79-246-178-246-318V343c84-14 166-39 246-101Z" fill="#15171b" opacity="0.92"/>
