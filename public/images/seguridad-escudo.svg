    <path d="M230 485h205l70-70h100"/>
    <path d="M1370 500h-210l-68-68h-95"/>
  </g>
  <g fill="#ff6a00">
    <circle cx="120" cy="215" r="9"/><circle cx="90" cy="755" r="9"/><circle cx="1480" cy="260" r="9"/><circle cx="1510" cy="725" r="9"/>
    <circle cx="230" cy="485" r="8"/><circle cx="1370" cy="500" r="8"/>
